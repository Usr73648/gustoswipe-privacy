<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Gusto Swipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2D6A4F;
      --green-light: #52b788;
      --ink: #1a1d1b;
      --muted: #6b7280;
      --bg: #f9f7f4;
      --card: #ffffff;
      --border: rgba(45,106,79,0.12);
      --red: #FF4D4F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--green);
      padding: 32px 24px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: white;
    }

    .logo-text span { color: #95d5b2; }

    .container {
      max-width: 440px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      flex: 1;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }

    .card-icon {
      width: 56px; height: 56px;
      background: rgba(45,106,79,0.1);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      background: #fafafa;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--green);
      background: white;
    }

    .password-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: rgba(45,106,79,0.08);
      color: var(--green);
      border: 1px solid rgba(45,106,79,0.2);
      display: block;
    }

    .message.error {
      background: rgba(255,77,79,0.08);
      color: var(--red);
      border: 1px solid rgba(255,77,79,0.2);
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .back-link a {
      color: var(--green);
      text-decoration: none;
    }

    .loading {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .invalid-token {
      text-align: center;
      padding: 32px 0;
    }

    .invalid-token .big-emoji {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .invalid-token h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .invalid-token p {
      color: var(--muted);
      font-size: 15px;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .container { padding: 24px 16px 60px; }
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <div class="logo-text">Gusto<span>Swipe</span></div>
  </div>
</header>

<div class="container">
  <div class="card" id="resetCard">
    <div class="card-icon">🔐</div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below.</p>

    <div class="message" id="message"></div>

    <form id="resetForm">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required>
        <p class="password-hint">Minimum 8 characters</p>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Set New Password</button>
    </form>

    <div class="back-link">
      <a href="index.html">← Privacy Policy</a> · <a href="terms-of-use.html">Terms of Use</a>
    </div>
  </div>
</div>

<footer>
  &copy; 2026 Gusto Swipe
</footer>

<script>
  const SUPABASE_URL = 'https://ozomaeguemoealmauabn.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_m0kHDqk35pigKD0k-gXpEw_q-_G5XYX'

  const messageEl = document.getElementById('message')
  const submitBtn = document.getElementById('submitBtn')
  const resetForm = document.getElementById('resetForm')

  function showMessage(text, type) {
    messageEl.textContent = text
    messageEl.className = `message ${type}`
  }

  // Extract tokens from URL hash
  function getHashParams() {
    const hash = window.location.hash.substring(1)
    const params = {}
    hash.split('&').forEach(part => {
      const [key, value] = part.split('=')
      if (key) params[decodeURIComponent(key)] = decodeURIComponent(value || '')
    })
    return params
  }

  const params = getHashParams()
  const accessToken = params['access_token']
  const type = params['type']

  // If no valid token, show error state
  if (!accessToken || type !== 'recovery') {
    resetForm.innerHTML = `
      <div class="invalid-token">
        <div class="big-emoji">⚠️</div>
        <h2>Link Expired or Invalid</h2>
        <p>This password reset link has expired or is invalid.<br>Please request a new one from the Gusto Swipe app.</p>
      </div>
    `
  }

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault()

    const password = document.getElementById('password').value
    const confirmPassword = document.getElementById('confirmPassword').value

    if (password.length < 8) {
      showMessage('Password must be at least 8 characters.', 'error')
      return
    }

    if (password !== confirmPassword) {
      showMessage('Passwords do not match.', 'error')
      return
    }

    submitBtn.disabled = true
    submitBtn.innerHTML = '<span class="loading"></span>Updating...'

    try {
      // First set the session using the access token
      const sessionRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=recovery`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ access_token: accessToken })
      })

      // Update the password using the access token directly
      const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({ password: password })
      })

      const data = await response.json()

      if (!response.ok) {
        throw new Error(data.message || data.error_description || 'Failed to update password')
      }

      showMessage('✅ Password updated successfully! You can now sign in to Gusto Swipe with your new password.', 'success')
      resetForm.querySelector('input[type="password"]') && (document.getElementById('password').disabled = true)
      document.getElementById('confirmPassword').disabled = true
      submitBtn.textContent = 'Done ✓'
      submitBtn.style.background = '#52b788'

    } catch (error) {
      showMessage(error.message || 'Something went wrong. Please try again.', 'error')
      submitBtn.disabled = false
      submitBtn.textContent = 'Set New Password'
    }
  })
</script>

</body>
</html>
